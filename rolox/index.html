<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ROLOX | Visualizador Seguro</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #050505; 
            color: #fff; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 1s linear infinite;
            margin: 20px auto 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* O iframe que vai mostrar o site real sem expor a URL no navegador do usuário */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2>Carregando com segurança...</h2>
        <div class="spinner"></div>
    </div>

    <iframe id="secure-frame" onload="mostrarSite()"></iframe>

<script>
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url');
    const frame = document.getElementById('secure-frame');
    const loader = document.getElementById('loader');

    if (targetUrl) {
        // Carrega o site real dentro do iframe de forma invisível
        frame.src = targetUrl;
    } else {
        loader.innerHTML = "<h2>Erro: Nenhuma URL informada.</h2>";
    }

    function mostrarSite() {
        // Esconde o carregando e revela o iframe com a imagem/conteúdo do site real
        loader.style.display = 'none';
        frame.style.display = 'block';
    }
</script>

</body>
</html>
