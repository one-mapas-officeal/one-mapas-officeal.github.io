<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aria Algorítmico - Auto Evolutiva</title>
    <style>
        body { 
            background: #121212; 
            color: #e3e3e3; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* BARRA LATERAL ESTILO GEMINI */
        .sidebar {
            width: 280px;
            background: #1e1e1e;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            box-sizing: border-box;
            user-select: none;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
        }

        .sidebar-top::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-top::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin-bottom: 8px;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #f1f3f4;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-title span {
            color: #8ab4f8;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 9999px;
            color: #e3e3e3;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background: #2a2a2a;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #9aa0a6;
            padding: 12px 12px 4px 12px;
            letter-spacing: 0.05em;
        }

        .history-item {
            padding: 8px 12px;
            border-radius: 9999px;
            font-size: 0.85rem;
            color: #c4c7c5;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .history-item.active {
            background: #004a77;
            color: #c2e7ff;
        }

        .sidebar-footer {
            border-top: 1px solid #2a2a2a;
            padding-top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px;
            font-size: 0.9rem;
            color: #e3e3e3;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #8ab4f8;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .settings-btn {
            background: none;
            border: none;
            color: #9aa0a6;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            margin: 0;
        }
        .settings-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }

        /* ÁREA PRINCIPAL */
        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #121212;
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            padding: 25px; 
            border: 1px solid #2a2a2a; 
            background: #1e1e1e; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.7); 
            text-align: center; 
        }
        
        input, textarea, select { 
            width: 90%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #2a2a2a; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 8px; 
            font-size: 1em; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #8ab4f8;
        }
        
        button { 
            width: 90%; 
            padding: 12px; 
            margin-top: 10px; 
            background: #8ab4f8; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1em; 
            transition: background 0.2s;
        }
        button:hover { background: #aecbfa; }
        
        .btn-danger { background: #f28b82; color: #000; }
        .btn-danger:hover { background: #f6aea9; }
        
        #btn-toggle { cursor: pointer; color: #8ab4f8; margin-top: 15px; font-size: 0.9em; text-decoration: none; }
        #btn-toggle:hover { text-decoration: underline; }
        .hidden { display: none; }
        
        .output-box { 
            margin-top: 15px; 
            padding: 15px; 
            background: #121212; 
            border: 1px solid #333; 
            text-align: left; 
            word-break: break-all; 
            font-size: 0.9em; 
            max-height: 200px; 
            overflow-y: auto; 
            border-radius: 8px; 
        }
        
        .status-badge { 
            font-size: 0.75em; 
            padding: 4px 10px; 
            border-radius: 9999px; 
            background: #2a2a2a; 
            color: #8ab4f8; 
            display: inline-block; 
            margin-bottom: 10px; 
            border: 1px solid #3c4043;
        }
    </style>
</head>
<body>

    <!-- BARRA LATERAL ESTILO GEMINI -->
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="brand-header">
                <div class="brand-title">✨ <span>Aria</span></div>
            </div>

            <div class="nav-item" onclick="novaConversa()">
                ✏️ Nova conversa
            </div>

            <div class="section-title">Idioma / Tradução</div>
            <div style="padding: 0 8px;">
                <select id="idioma-select" style="width: 100%; margin: 4px 0 12px 0;">
                    <option value="pt" selected>Português (PT)</option>
                    <option value="en">English (EN)</option>
                    <option value="es">Español (ES)</option>
                    <option value="fr">Français (FR)</option>
                </select>
            </div>

            <div class="section-title">Recentes</div>
            <div class="history-list" id="sidebar-history">
                <div class="history-item active">📁 contas/user_inicial</div>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="avatar-letra">A</div>
                <span id="label-usuario">Convidado</span>
            </div>
            <button class="settings-btn" title="Configurações">⚙️</button>
        </div>
    </div>

    <!-- ÁREA PRINCIPAL -->
    <div class="main-content">
        <!-- TELA DE LOGIN / REGISTRO -->
        <div class="container" id="auth-box">
            <h2 id="titulo">Login Aria</h2>
            <span class="status-badge">Núcleo Auto-Evolutivo Ativo</span>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button id="btn-acao" onclick="enviarAuth()">Entrar</button>
            <p id="btn-toggle" onclick="alternarTela()">Registrar-se</p>
        </div>

        <!-- PAINEL PRINCIPAL DO USUÁRIO E EVOLUÇÃO DAS IAs -->
        <div class="container hidden" id="chat-box">
            <h2>Painel Aria - <span id="span-user" style="color: #8ab4f8;"></span></h2>
            <div class="status-badge">Pasta de Testes & Hierarquia Evolutiva</div>
            
            <textarea id="pergunta" rows="3" placeholder="Digite sua busca ou comando para a IA..."></textarea>
            <button onclick="enviarBusca()">Pesquisar / Consultar</button>
            
            <div class="output-box" id="resultado-pesquisa">Aguardando comando do sistema...</div>
            
            <button class="btn-danger" onclick="sair()" style="margin-top: 20px;">Sair da Sessão</button>
        </div>
    </div>

    <script>
        const API_URL = "https://bug-free-space-xylophone-77vw76xx4gwr3rwjq-5000.app.github.dev";
        
        let isLogin = true;
        let usuarioAtual = "";
        
        function alternarTela() {
            isLogin = !isLogin;
            document.getElementById('titulo').innerText = isLogin ? "Login Aria" : "Cadastro Aria";
            document.getElementById('btn-acao').innerText = isLogin ? "Entrar" : "Criar Conta";
            document.getElementById('btn-toggle').innerText = isLogin ? "Registrar-se" : "Já tenho conta";
        }

        function enviarAuth() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const lang = document.getElementById('idioma-select').value;
            
            if(!user || !pass) {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            fetch(`${API_URL}/?id=${encodeURIComponent(user)}&senha=${encodeURIComponent(pass)}&lang=${lang}`)
            .then(response => response.text())
            .then(htmlResposta => {
                usuarioAtual = user;
                document.getElementById('span-user').innerText = user;
                document.getElementById('label-usuario').innerText = user;
                document.getElementById('avatar-letra').innerText = user.charAt(0).toUpperCase();
                
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('chat-box').classList.remove('hidden');
                
                const sidebarHistory = document.getElementById('sidebar-history');
                sidebarHistory.innerHTML += `<div class="history-item active">📁 contas/user_${user}</div>`;
            })
            .catch(err => {
                console.error("Erro de conexão:", err);
                alert("Erro ao conectar com o Codespaces.");
            });
        }

        function enviarBusca() {
            const query = document.getElementById('pergunta').value.trim();
            const lang = document.getElementById('idioma-select').value;
            if(!query) return;

            document.getElementById('resultado-pesquisa').innerHTML = "Processando via sub-IAs e hierarquia de testes...";

            fetch(`${API_URL}/?id=${encodeURIComponent(usuarioAtual)}&pergunta=${encodeURIComponent(query)}&lang=${lang}`)
            .then(response => response.text())
            .then(htmlResposta => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlResposta, 'text/html');
                const conteudoDiv = doc.getElementById('conteudo');
                
                const textoFinal = conteudoDiv ? conteudoDiv.innerHTML : htmlResposta;
                document.getElementById('resultado-pesquisa').innerHTML = `<b>Resposta do Sistema / Evolução:</b><br><br>${textoFinal}`;
            })
            .catch(err => {
                document.getElementById('resultado-pesquisa').innerText = "Erro crítico ao contatar o processador de IAs.";
            });
        }

        function novaConversa() {
            if(usuarioAtual) {
                document.getElementById('pergunta').value = "";
                document.getElementById('resultado-pesquisa').innerText = "Aguardando comando do sistema...";
            }
        }

        function sair() {
            usuarioAtual = "";
            document.getElementById('chat-box').classList.add('hidden');
            document.getElementById('auth-box').classList.remove('hidden');
            document.getElementById('label-usuario').innerText = "Convidado";
            document.getElementById('avatar-letra').innerText = "A";
            document.getElementById('pergunta').value = "";
            document.getElementById('resultado-pesquisa').innerText = "Aguardando comando do sistema...";
            document.getElementById('user').value = "";
            document.getElementById('pass').value = "";
        }
    </script>
</body>
</html>
