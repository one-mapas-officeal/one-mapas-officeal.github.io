<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; background: #f4f4f9; }
        h1 { text-align: center; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        a { display: inline-block; margin-top: 10px; padding: 10px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        a:hover { background: #0056b3; }
        .nome-projeto { font-size: 1.2em; margin: 0; color: #444; text-transform: capitalize; }
    </style>
</head>
<body>

    <h1>Meus Projetos</h1>

    <div class="grid">
        <!-- Apenas coloque o link no atributo data-url -->
        <div class="card" data-url="https://one-mapas-officeal.github.io/rolox"></div>
        <div class="card" data-url="https://one-mapas-officeal.github.io/exemplo-projeto"></div>
    </div>

    <script>
        // Este script pega o que está após a última barra e coloca como título
        document.querySelectorAll('.card').forEach(card => {
            const url = card.getAttribute('data-url');
            const nome = url.split('/').pop().replace(/-/g, ' ');
            
            card.innerHTML = `
                <h3 class="nome-projeto">${nome}</h3>
                <a href="${url}" target="_blank">Acessar</a>
            `;
        });
    </script>
</body>
</html>
